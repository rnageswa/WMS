          required: [zone]

    AdjustInventoryBody:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        newQty:
          type: integer
          minimum: 0
        reasonCode:
          type: string
      required: [productId, binId, newQty, reasonCode]

    # ── Movements ─────────────────────────────────────────────────────────────

    InventoryMovement:
      type: object
      properties:
        id:
          type: string
          format: uuid
