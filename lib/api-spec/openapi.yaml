          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        product:
          $ref: "#/components/schemas/Product"
        bin:
          $ref: "#/components/schemas/BinWithLocation"
      required:
        - id
        - productId
        - binId
        - movementType
        - quantity
        - createdAt
        - product
        - bin

