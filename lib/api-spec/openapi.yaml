openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WMS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: SKU / product management
  - name: locations
    description: Warehouse, zone, and bin management
  - name: inventory
    description: Inventory levels and adjustments
  - name: movements
    description: Inventory movement audit log
  - name: purchasing
    description: Suppliers and purchase orders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Products ───────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product SKU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: SKU code or barcode already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deactivateProduct
      tags: [products]
      summary: Deactivate a product (soft delete)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Deactivated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Warehouses ─────────────────────────────────────────────────────────────

  /warehouses:
    get:
      operationId: listWarehouses
      tags: [locations]
      summary: List all warehouses
      responses:
        "200":
          description: Warehouse list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: createWarehouse
      tags: [locations]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarehouseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [locations]
      summary: Get a warehouse with its zones and bins
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Warehouse with nested zones and bins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateWarehouse
      tags: [locations]
      summary: Update a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWarehouseBody"
      responses:
        "200":
          description: Updated warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Zones ──────────────────────────────────────────────────────────────────

  /warehouses/{id}/zones:
    get:
      operationId: listZones
      tags: [locations]
      summary: List zones for a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      operationId: createZone
      tags: [locations]
      summary: Create a zone inside a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneBody"
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "404":
          $ref: "#/components/responses/NotFound"

  /zones/{id}/bins:
    get:
      operationId: listBins
      tags: [locations]
      summary: List bins for a zone
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Bin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bin"
    post:
      operationId: createBin
      tags: [locations]
      summary: Create a bin inside a zone
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBinBody"
      responses:
        "201":
          description: Created bin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bin"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Bin code already exists in this zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Inventory ──────────────────────────────────────────────────────────────

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory levels (filterable)
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: binId
          in: query
          schema:
            type: string
            format: uuid
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: lowStock
          in: query
          description: Return only items at or below reorder threshold
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory item list with product and location details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Manually adjust inventory quantity for a SKU at a bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustInventoryBody"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Movements ──────────────────────────────────────────────────────────────

  /movements:
    get:
      operationId: listMovements
      tags: [movements]
      summary: List inventory movements
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: binId
          in: query
          schema:
            type: string
            format: uuid
        - name: movementType
          in: query
          schema:
            type: string
            enum: [adjustment, inbound, outbound]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Movement list newest-first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryMovement"

  # ─── Suppliers ───────────────────────────────────────────────────────────────

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [inventory]
      summary: List all suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Supplier list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [inventory]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [inventory]
      summary: Get supplier detail with PO history
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Supplier detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupplier
      tags: [inventory]
      summary: Update a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Purchase Orders ─────────────────────────────────────────────────────────

  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [inventory]
      summary: List all purchase orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, ordered, partially_received, received, cancelled]
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [inventory]
      summary: Create a new draft purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderBody"
      responses:
        "201":
          description: Created purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [inventory]
      summary: Get a single PO with its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Purchase order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/status:
    patch:
      operationId: updatePurchaseOrderStatus
      tags: [inventory]
      summary: Update a PO's status (e.g. draft → ordered, or cancel)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePoStatusBody"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/aging:
    get:
      operationId: getPurchaseOrderAging
      tags: [inventory]
      summary: Aging breakdown of open purchase orders by delivery date status
      responses:
        "200":
          description: PO aging summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoAgingSummary"

  /purchase-orders/{id}/delivery-date:
    patch:
      operationId: updatePurchaseOrderDeliveryDate
      tags: [inventory]
      summary: Set or clear the expected delivery date on a PO
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePoDeliveryDateBody"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/email:
    post:
      operationId: sendPurchaseOrderEmail
      tags: [inventory]
      summary: Send the PO as a formatted email to the supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPoEmailBody"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPoEmailResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [inventory]
      summary: Receive items against a PO — creates inbound inventory movements
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceivePoBody"
      responses:
        "200":
          description: Receive result with updated PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceivePoResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Alerts ──────────────────────────────────────────────────────────────────

  /alerts/low-stock:
    get:
      operationId: getLowStockAlerts
      tags: [inventory]
      summary: Products whose total on-hand qty is at or below their reorder threshold
      responses:
        "200":
          description: Low-stock alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LowStockAlertList"

  # ─── Dashboard summary ───────────────────────────────────────────────────────

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [inventory]
      summary: Aggregate counts for dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Reports ─────────────────────────────────────────────────────────────────

  /reports/stock-value:
    get:
      operationId: getStockValueReport
      tags: [inventory]
      summary: Stock value grouped by category with per-product breakdown
      responses:
        "200":
          description: Stock value report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockValueReport"

  /reorder-suggestions:
    get:
      operationId: getReorderSuggestions
      tags: [purchasing]
      summary: Products below reorder threshold, grouped by last-used supplier for fast PO creation
      responses:
        "200":
          description: Reorder suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderSuggestions"

  /reports/supplier-performance:
    get:
      operationId: getSupplierPerformanceReport
      tags: [purchasing]
      summary: Supplier performance metrics derived from purchase order history
      responses:
        "200":
          description: Supplier performance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPerformanceReport"

  /reports/inventory-csv:
    get:
      operationId: getInventoryCsv
      tags: [inventory]
      summary: Full inventory as CSV download
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  # ─── Cycle Count ─────────────────────────────────────────────────────────────

  /cycle-counts/submit:
    post:
      operationId: submitCycleCount
      tags: [inventory]
      summary: Submit a cycle count — creates adjustment movements for discrepancies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCycleCountBody"
      responses:
        "200":
          description: Cycle count submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleCountResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Receiving ───────────────────────────────────────────────────────────────

  /receiving/commit:
    post:
      operationId: commitReceipt
      tags: [inventory]
      summary: Receive a shipment — create inbound movements and update inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitReceiptBody"
      responses:
        "200":
          description: Receipt committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitReceiptResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Transfer ────────────────────────────────────────────────────────────────

  /transfer/commit:
    post:
      operationId: commitTransfer
      tags: [inventory]
      summary: Transfer stock between bins — atomic outbound + inbound movements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitTransferBody"
      responses:
        "200":
          description: Transfer committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitTransferResult"
        "400":
          description: Validation error or insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Dispatch ────────────────────────────────────────────────────────────────

  /dispatch/commit:
    post:
      operationId: commitDispatch
      tags: [inventory]
      summary: Dispatch an order — create outbound movements and decrement inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitDispatchBody"
      responses:
        "200":
          description: Dispatch committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitDispatchResult"
        "400":
          description: Validation error or insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Scan ────────────────────────────────────────────────────────────────────

  /scan:
    get:
      operationId: scanLookup
      tags: [inventory]
      summary: Resolve a barcode or bin code to inventory
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Bin code, product SKU, or product barcode
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Products ──────────────────────────────────────────────────────────────

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skuCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - skuCode
        - name
        - unitOfMeasure
        - reorderThreshold
        - isActive
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        skuCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
          default: each
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
      required: [skuCode, name, unitOfMeasure]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
        isActive:
          type: boolean

    # ── Locations ─────────────────────────────────────────────────────────────

    Warehouse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
