          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Picking task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingTask"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /picking-tasks/{id}/assign:
    put:
      operationId: assignPickingTask
      tags: [picking]
      summary: Assign picking task to picker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPickingTaskBody"
      responses:
        "200":
          description: Task assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingTask"
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /picking-tasks/{id}/start:
    put:
      operationId: startPickingTask
      tags: [picking]
      summary: Start picking task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingTask"
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /picking-tasks/{id}/complete:
    put:
      operationId: completePickingTask
      tags: [picking]
      summary: Complete picking task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingTask"
        "400":
          description: Not all lines picked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /picking-tasks/{id}/cancel:
    put:
      operationId: cancelPickingTask
      tags: [picking]
      summary: Cancel picking task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingTask"
        "400":
          description: Cannot cancel completed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /picking-tasks/{id}/lines/{lineId}/pick:
    put:
      operationId: pickPickingLine
      tags: [picking]
      summary: Update picked quantity for a line
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lineId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickPickingLineBody"
      responses:
        "200":
          description: Line updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingLine"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task or line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    clerk:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Products ──────────────────────────────────────────────────────────────

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skuCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - skuCode
        - name
        - unitOfMeasure
        - reorderThreshold
        - isActive
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        skuCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
          default: each
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
      required: [skuCode, name, unitOfMeasure]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
        unitPrice:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
        isActive:
          type: boolean

    # ── Locations ─────────────────────────────────────────────────────────────

    Warehouse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, isActive, createdAt, updatedAt]

    WarehouseDetail:
      allOf:
        - $ref: "#/components/schemas/Warehouse"
        - type: object
          properties:
            zones:
              type: array
              items:
                $ref: "#/components/schemas/ZoneWithBins"
          required: [zones]

    CreateWarehouseBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
      required: [name]

    UpdateWarehouseBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: boolean

    Zone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, warehouseId, name, code, createdAt]

    ZoneWithBins:
      allOf:
        - $ref: "#/components/schemas/Zone"
        - type: object
          properties:
            bins:
              type: array
              items:
                $ref: "#/components/schemas/Bin"
          required: [bins]

    CreateZoneBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
      required: [name, code]

    Bin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        zoneId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, zoneId, code, isActive, createdAt]

    CreateBinBody:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
          nullable: true
      required: [code]

    # ── Inventory ─────────────────────────────────────────────────────────────

    InventoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        qtyOnHand:
          type: integer
        updatedAt:
          type: string
          format: date-time
        product:
          $ref: "#/components/schemas/Product"
        bin:
          $ref: "#/components/schemas/BinWithLocation"
      required: [id, productId, binId, qtyOnHand, updatedAt, product, bin]

    BinWithLocation:
      allOf:
        - $ref: "#/components/schemas/Bin"
        - type: object
          properties:
            zone:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                code:
                  type: string
                warehouse:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                  required: [id, name]
              required: [id, name, code, warehouse]
          required: [zone]

    AdjustInventoryBody:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        newQty:
          type: integer
          minimum: 0
        reasonCode:
          type: string
      required: [productId, binId, newQty, reasonCode]

    # ── Movements ─────────────────────────────────────────────────────────────

    InventoryMovement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        movementType:
          type: string
          enum: [adjustment, inbound, outbound]
        quantity:
          type: integer
        reasonCode:
          type: string
          nullable: true
        referenceId:
          type: string
          format: uuid
          nullable: true
        referenceType:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        product:
          $ref: "#/components/schemas/Product"
        bin:
          $ref: "#/components/schemas/BinWithLocation"
      required:
        - id
        - productId
        - binId
        - movementType
        - quantity
        - createdAt
        - product
        - bin

    # ── Purchase Orders ───────────────────────────────────────────────────────

    PoLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        skuCode:
          type: string
          nullable: true
        productName:
          type: string
          nullable: true
        qtyOrdered:
          type: integer
        qtyReceived:
          type: integer
        unitCost:
          type: number
          nullable: true
        status:
          type: string
          enum: [pending, partially_received, received]
      required: [id, productId, qtyOrdered, qtyReceived, status]

    # ── Suppliers ──────────────────────────────────────────────────────────────

    Supplier:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        leadTimeDays:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        isActive:
          type: boolean
        poCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, isActive, poCount, createdAt, updatedAt]

    SupplierPoSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        poNumber:
          type: string
        status:
          type: string
          enum: [draft, ordered, partially_received, received, cancelled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, poNumber, status, createdAt, updatedAt]

    SupplierDetail:
      allOf:
        - $ref: "#/components/schemas/Supplier"
        - type: object
          properties:
            purchaseOrders:
              type: array
              items:
                $ref: "#/components/schemas/SupplierPoSummary"
          required: [purchaseOrders]

    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        leadTimeDays:
          type: integer
          minimum: 0
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name]

    UpdateSupplierBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        leadTimeDays:
          type: integer
          minimum: 0
          nullable: true
        notes:
          type: string
          nullable: true
        isActive:
          type: boolean

    # ── Purchase Orders ────────────────────────────────────────────────────────

    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        poNumber:
          type: string
        supplierId:
          type: string
          format: uuid
          nullable: true
        supplierName:
          type: string
        status:
          type: string
          enum: [draft, ordered, partially_received, received, cancelled]
        currency:
          type: string
          default: USD
        exchangeRate:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        expectedDeliveryDate:
          type: string
          format: date
          nullable: true
        lineCount:
          type: integer
        totalQtyOrdered:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, poNumber, supplierName, status, lineCount, totalQtyOrdered, createdAt, updatedAt]

    PurchaseOrderDetail:
      allOf:
        - $ref: "#/components/schemas/PurchaseOrder"
        - type: object
          properties:
            lines:
              type: array
              items:
                $ref: "#/components/schemas/PoLine"
          required: [lines]

    CreatePoLineBody:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        qtyOrdered:
          type: integer
          minimum: 1
        unitCost:
          type: number
          nullable: true
      required: [productId, qtyOrdered]

    CreatePurchaseOrderBody:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
          nullable: true
        supplierName:
          type: string
          minLength: 1
          nullable: true
        notes:
          type: string
          nullable: true
        expectedDeliveryDate:
          type: string
          format: date
          nullable: true
        currency:
          type: string
          default: USD
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CreatePoLineBody"
          minItems: 1
      required: [lines]

    UpdatePoDeliveryDateBody:
      type: object
      properties:
        expectedDeliveryDate:
          type: string
          format: date
          nullable: true
      required: [expectedDeliveryDate]

    UpdatePoStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [ordered, cancelled]
      required: [status]

    ReceivePoLineBody:
      type: object
      properties:
        lineId:
          type: string
          format: uuid
        qtyReceived:
          type: integer
          minimum: 1
        binId:
          type: string
          format: uuid
      required: [lineId, qtyReceived, binId]

    ReceivePoBody:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ReceivePoLineBody"
          minItems: 1
      required: [lines]

    ReceivePoResult:
      type: object
      properties:
        po:
          $ref: "#/components/schemas/PurchaseOrder"
        movementsCreated:
          type: integer
      required: [po, movementsCreated]

    PoAgingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        poNumber:
          type: string
        supplierName:
          type: string
        status:
          type: string
        expectedDeliveryDate:
          type: string
          format: date
          nullable: true
        daysOverdue:
          type: integer
          nullable: true
      required: [id, poNumber, supplierName, status]

    PoAgingSummary:
      type: object
      properties:
        totalOpen:
          type: integer
        overdue:
          type: integer
        dueThisWeek:
          type: integer
        upcoming:
          type: integer
        noDate:
          type: integer
        overdueItems:
          type: array
          items:
            $ref: "#/components/schemas/PoAgingItem"
      required: [totalOpen, overdue, dueThisWeek, upcoming, noDate, overdueItems]

    SendPoEmailBody:
      type: object
      properties:
        to:
          type: string
          format: email
      required: [to]

    SendPoEmailResult:
      type: object
      properties:
        emailId:
          type: string
        to:
          type: string
        poNumber:
          type: string
      required: [emailId, to, poNumber]

    # ── Alerts ────────────────────────────────────────────────────────────────

    LowStockAlert:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        skuCode:
          type: string
        name:
          type: string
        category:
          type: string
          nullable: true
        reorderThreshold:
          type: integer
        totalQty:
          type: integer
        shortfall:
          type: integer
        severity:
          type: string
          enum: [critical, warning]
        warehouseSummary:
          type: array
          items:
            type: object
            properties:
              warehouseName:
                type: string
              qty:
                type: integer
            required: [warehouseName, qty]
      required: [productId, skuCode, name, reorderThreshold, totalQty, shortfall, severity, warehouseSummary]

    LowStockAlertList:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        totalAlerts:
          type: integer
        criticalCount:
          type: integer
        warningCount:
          type: integer
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/LowStockAlert"
      required: [generatedAt, totalAlerts, criticalCount, warningCount, alerts]

    # ── Cycle Count ───────────────────────────────────────────────────────────

    CycleCountLine:
      type: object
      properties:
        inventoryItemId:
          type: string
          format: uuid
        physicalQty:
          type: integer
          minimum: 0
      required: [inventoryItemId, physicalQty]

    SubmitCycleCountBody:
      type: object
      properties:
        reference:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CycleCountLine"
          minItems: 1
      required: [lines]

    CycleCountDiscrepancy:
      type: object
      properties:
        inventoryItemId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        productName:
          type: string
          nullable: true
        skuCode:
          type: string
          nullable: true
        binCode:
          type: string
          nullable: true
        systemQty:
          type: integer
        physicalQty:
          type: integer
        variance:
          type: integer
      required: [inventoryItemId, productId, binId, systemQty, physicalQty, variance]

    CycleCountResult:
      type: object
      properties:
        reference:
          type: string
          nullable: true
        linesScanned:
          type: integer
        adjustmentCount:
          type: integer
        discrepancies:
          type: array
          items:
            $ref: "#/components/schemas/CycleCountDiscrepancy"
        movements:
          type: array
          items:
            $ref: "#/components/schemas/InventoryMovement"
      required: [linesScanned, adjustmentCount, discrepancies, movements]

    # ── Reports ───────────────────────────────────────────────────────────────

    StockValueCategory:
      type: object
      properties:
        category:
          type: string
        totalValue:
          type: number
        totalUnits:
          type: integer
        productCount:
          type: integer
        lowStockCount:
          type: integer
      required: [category, totalValue, totalUnits, productCount, lowStockCount]

    StockValueProduct:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        skuCode:
          type: string
        name:
          type: string
        category:
          type: string
        totalUnits:
          type: integer
        unitPrice:
          type: number
          nullable: true
        totalValue:
          type: number
        reorderThreshold:
          type: integer
        isLow:
          type: boolean
      required: [productId, skuCode, name, category, totalUnits, totalValue, reorderThreshold, isLow]

    StockValueReport:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        totalStockValue:
          type: number
        totalUnits:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/StockValueCategory"
        products:
          type: array
          items:
            $ref: "#/components/schemas/StockValueProduct"
      required: [generatedAt, totalStockValue, totalUnits, categories, products]

    # ── Transfer ──────────────────────────────────────────────────────────────

    CommitTransferLine:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        fromBinId:
          type: string
          format: uuid
        toBinId:
          type: string
          format: uuid
        qty:
          type: integer
          minimum: 1
      required: [productId, fromBinId, toBinId, qty]

    CommitTransferBody:
      type: object
      properties:
        reference:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CommitTransferLine"
          minItems: 1
      required: [lines]

    TransferStockError:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        fromBinId:
          type: string
          format: uuid
        requested:
          type: integer
        available:
          type: integer
        productName:
          type: string
        binCode:
          type: string
      required: [productId, fromBinId, requested, available, productName, binCode]

    CommitTransferResult:
      type: object
      properties:
        reference:
          type: string
          nullable: true
        linesCommitted:
          type: integer
        movements:
          type: array
          items:
            $ref: "#/components/schemas/InventoryMovement"
      required: [linesCommitted, movements]

    # ── Dispatch ──────────────────────────────────────────────────────────────

    CommitDispatchLine:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        binId:
          type: string
          format: uuid
        qty:
          type: integer
          minimum: 1
      required: [productId, binId, qty]

    CommitDispatchBody:
