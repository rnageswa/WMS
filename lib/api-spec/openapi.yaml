openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WMS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: currency
    description: Currencies and exchange rates
  - name: products
    description: SKU / product management
  - name: locations
    description: Warehouse, zone, and bin management
  - name: inventory
    description: Inventory levels and adjustments
  - name: movements
    description: Inventory movement audit log
  - name: purchasing
    description: Suppliers and purchase orders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Currency ───────────────────────────────────────────────────────────────

  /currencies:
    get:
      operationId: listCurrencies
      tags: [currency]
      summary: List all currencies
      responses:
        "200":
          description: Currency list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Currency"
    post:
      operationId: createCurrency
      tags: [currency]
      summary: Add a new currency (admin)
      security:
        - clerk: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCurrencyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Currency"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Currency already exists

  /exchange-rates:
    get:
      operationId: listExchangeRates
      tags: [currency]
      summary: List exchange rates
      parameters:
        - name: from
          in: query
          description: From currency code
          schema:
            type: string
        - name: to
          in: query
          description: To currency code
          schema:
            type: string
        - name: fromDate
          in: query
          description: Filter rates effective on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Exchange rate list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeRate"
    post:
      operationId: createExchangeRate
      tags: [currency]
      summary: Add an exchange rate (admin)
      security:
        - clerk: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExchangeRateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /convert:
    get:
      operationId: convertCurrency
      tags: [currency]
      summary: Convert amount between currencies
      parameters:
        - name: from
          in: query
          required: true
          description: From currency code
          schema:
            type: string
        - name: to
          in: query
          required: true
          description: To currency code
          schema:
            type: string
        - name: amount
          in: query
          required: true
          description: Amount to convert
          schema:
            type: number
      responses:
        "200":
          description: Conversion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Exchange rate not found

  # ─── Products ───────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product SKU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: SKU code or barcode already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deactivateProduct
      tags: [products]
      summary: Deactivate a product (soft delete)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Deactivated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Warehouses ─────────────────────────────────────────────────────────────

  /warehouses:
    get:
      operationId: listWarehouses
      tags: [locations]
      summary: List all warehouses
      responses:
        "200":
          description: Warehouse list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: createWarehouse
      tags: [locations]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarehouseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [locations]
      summary: Get a warehouse with its zones and bins
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Warehouse with nested zones and bins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateWarehouse
      tags: [locations]
      summary: Update a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWarehouseBody"
      responses:
        "200":
          description: Updated warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Zones ──────────────────────────────────────────────────────────────────

  /warehouses/{id}/zones:
    get:
      operationId: listZones
      tags: [locations]
      summary: List zones for a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      operationId: createZone
      tags: [locations]
      summary: Create a zone inside a warehouse
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneBody"
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "404":
          $ref: "#/components/responses/NotFound"

  /locations/bin-activity:
    get:
      operationId: getBinActivity
      tags: [locations]
      summary: Movement counts per bin within a zone
      parameters:
        - name: zoneId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Bin activity stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinActivityItem"

  /locations/zone-activity:
    get:
      operationId: getZoneActivity
      tags: [locations]
      summary: Movement counts per zone for heatmap
      parameters:
        - name: days
          in: query
          description: Lookback window in days (default 30)
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Zone activity stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneActivityItem"

  /bins:
    get:
      operationId: listAllBins
      tags: [locations]
      summary: List all bins across all warehouses, enriched with zone and warehouse
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: zoneId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: All bins with location context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinWithLocation"

  /zones/{id}/bins:
    get:
      operationId: listBins
      tags: [locations]
      summary: List bins for a zone
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Bin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bin"
    post:
      operationId: createBin
      tags: [locations]
      summary: Create a bin inside a zone
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBinBody"
      responses:
        "201":
          description: Created bin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bin"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Bin code already exists in this zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Inventory ──────────────────────────────────────────────────────────────

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory levels (filterable)
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: binId
          in: query
          schema:
            type: string
            format: uuid
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: lowStock
          in: query
          description: Return only items at or below reorder threshold
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory item list with product and location details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Manually adjust inventory quantity for a SKU at a bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustInventoryBody"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Movements ──────────────────────────────────────────────────────────────

  /movements:
    get:
      operationId: listMovements
      tags: [movements]
      summary: List inventory movements
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: binId
          in: query
          schema:
            type: string
            format: uuid
        - name: movementType
          in: query
          schema:
            type: string
            enum: [adjustment, inbound, outbound]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Movement list newest-first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryMovement"

  # ─── Suppliers ───────────────────────────────────────────────────────────────

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [inventory]
      summary: List all suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Supplier list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [inventory]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [inventory]
      summary: Get supplier detail with PO history
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Supplier detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupplier
      tags: [inventory]
      summary: Update a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Purchase Orders ─────────────────────────────────────────────────────────

  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [inventory]
      summary: List all purchase orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, ordered, partially_received, received, cancelled]
        - in: query
          name: q
          schema:
            type: string
          description: Search by PO number, supplier name, or product SKU / name
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [inventory]
      summary: Create a new draft purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderBody"
      responses:
        "201":
          description: Created purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/bulk-cancel:
    post:
      operationId: bulkCancelPurchaseOrders
      tags: [inventory]
      summary: Cancel multiple purchase orders at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Number of orders cancelled
          content:
            application/json:
              schema:
                type: object
                required: [cancelled]
                properties:
                  cancelled:
                    type: integer
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/bulk-delete:
    delete:
      operationId: bulkDeletePurchaseOrders
      tags: [inventory]
      summary: Delete multiple draft purchase orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Number of orders deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [inventory]
      summary: Get a single PO with its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Purchase order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/status:
    patch:
      operationId: updatePurchaseOrderStatus
      tags: [inventory]
      summary: Update a PO's status (e.g. draft → ordered, or cancel)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePoStatusBody"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/aging:
    get:
      operationId: getPurchaseOrderAging
      tags: [inventory]
      summary: Aging breakdown of open purchase orders by delivery date status
      responses:
        "200":
          description: PO aging summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoAgingSummary"

  /purchase-orders/{id}/delivery-date:
    patch:
      operationId: updatePurchaseOrderDeliveryDate
      tags: [inventory]
      summary: Set or clear the expected delivery date on a PO
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePoDeliveryDateBody"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/email:
    post:
      operationId: sendPurchaseOrderEmail
      tags: [inventory]
      summary: Send the PO as a formatted email to the supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPoEmailBody"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPoEmailResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [inventory]
      summary: Receive items against a PO — creates inbound inventory movements
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceivePoBody"
      responses:
        "200":
          description: Receive result with updated PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceivePoResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/duplicate:
    post:
      operationId: duplicatePurchaseOrder
      tags: [inventory]
      summary: Duplicate a PO as a new draft (copies supplier, notes and line items)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: New draft PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/history:
    get:
      operationId: getPoHistory
      tags: [inventory]
      summary: Get the timeline history events for a PO
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ordered list of history events (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoHistoryEvent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-orders/{id}/grn:
    get:
      operationId: getPurchaseOrderGrn
      tags: [inventory]
      summary: Get Goods Receipt Note data for a PO
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: GRN data including PO info, receipt events, and movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoodsReceiptNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Alerts ──────────────────────────────────────────────────────────────────

    # ── Sales Orders ─────────────────────────────────────────────
  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [sales-orders]
      summary: List sales orders
      parameters:
        - name: q
          in: query
          description: Search by order number or customer name
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [draft, confirmed, picking, picking_complete, packed, shipped, delivered, cancelled]
        - name: customer
          in: query
          description: Filter by customer name
          schema:
            type: string
      responses:
        "200":
          description: Sales order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesOrder"
    post:
      operationId: createSalesOrder
      tags: [sales-orders]
      summary: Create a new sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}:
    get:
      operationId: getSalesOrder
      tags: [sales-orders]
      summary: Get a single sales order with lines
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Sales order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSalesOrder
      tags: [sales-orders]
      summary: Update a sales order (draft only)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderBody"
      responses:
        "200":
          description: Updated sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSalesOrder
      tags: [sales-orders]
      summary: Delete a draft sales order
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /sales-orders/{id}/confirm:
    post:
      operationId: confirmSalesOrder
      tags: [sales-orders]
      summary: Confirm order (draft → confirmed)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only confirm draft orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/start-picking:
    post:
      operationId: startPickingSalesOrder
      tags: [sales-orders]
      summary: Start picking (confirmed → picking)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Picking started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only start picking on confirmed orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/complete-picking:
    post:
      operationId: completePickingSalesOrder
      tags: [sales-orders]
      summary: Complete picking (picking → picking_complete)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Picking complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only complete picking on orders in picking status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/pack:
    post:
      operationId: packSalesOrder
      tags: [sales-orders]
      summary: Pack order (picking_complete → packed)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Order packed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only pack orders with picking complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/ship:
    post:
      operationId: shipSalesOrder
      tags: [sales-orders]
      summary: Ship order (packed → shipped)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingNumber:
                  type: string
                carrier:
                  type: string
      responses:
        "200":
          description: Order shipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only ship packed orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/delivered:
    post:
      operationId: deliverSalesOrder
      tags: [sales-orders]
      summary: Mark as delivered (shipped → delivered)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Order delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Can only mark shipped orders as delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/cancel:
    post:
      operationId: cancelSalesOrder
      tags: [sales-orders]
      summary: Cancel sales order
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          description: Cannot cancel shipped or delivered orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/lines/{lineId}/pick:
    put:
      operationId: updateSalesOrderLinePick
      tags: [sales-orders]
      summary: Update pick quantity for a line
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: lineId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qtyPicked]
              properties:
                qtyPicked:
                  type: integer
                  minimum: 0
                binId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Line updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderLine"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-orders/{id}/pick-list:
    get:
      operationId: getSalesOrderPickList
      tags: [sales-orders]
      summary: Get pick list for a sales order
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Pick list
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderNumber:
                    type: string
                  customerName:
                    type: string
                  status:
                    type: string
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        skuCode:
                          type: string
                        productName:
                          type: string
                        qtyOrdered:
                          type: integer
                        qtyPicked:
                          type: integer
                        binCode:
                          type: string
                        status:
                          type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /sales-orders/{id}/packing-slip:
    get:
      operationId: getSalesOrderPackingSlip
      tags: [sales-orders]
      summary: Get packing slip data for a sales order
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Packing slip data
          content:
            application/json:
              schema:
                type: object
                properties:
                  packingSlipNumber:
                    type: string
                  orderNumber:
                    type: string
                  customerName:
                    type: string
                  status:
                    type: string
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        skuCode:
                          type: string
                        productName:
                          type: string
                        qtyPacked:
                          type: integer
                        unitPrice:
                          type: number
                  summary:
                    type: object
                    properties:
                      totalLines:
                        type: integer
                      totalItems:
                        type: integer
                      totalValue:
                        type: number
        "404":
          $ref: "#/components/responses/NotFound"


/alerts/low-stock:
